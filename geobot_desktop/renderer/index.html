<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GeoBot Desktop</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <main class="content-shell">
        <header class="topbar panel-surface">
          <div class="brand-block">
            <div class="brand-chip">GeoBot Desktop</div>
            <div class="brand-mark">GeoBot</div>
            <div class="brand-subtitle">地理教学智能中枢</div>
          </div>

          <div class="hero-copy">
            <div class="hero-kicker">Chat x QGIS</div>
            <h1>聊天驱动的 QGIS 教学工作台</h1>
            <p>输入完整教学需求，GeoBot 将在对话中理解任务，并在需要时联动 QGIS 生成地图、图表和展示结果。</p>
          </div>

          <div class="topbar-side">
            <div id="status-pills" class="status-pills"></div>
            <div class="topbar-actions">
              <button id="focus-qgis-button" class="secondary-button" type="button">切到 QGIS</button>
              <button
                id="toggle-status-button"
                class="ghost-button status-toggle-button"
                type="button"
                aria-expanded="false"
                aria-controls="status-drawer"
              >
                <span class="status-toggle-title">查看状态</span>
                <span id="status-toggle-hint" class="status-toggle-hint">系统在线</span>
              </button>
            </div>
          </div>
        </header>

        <section class="workspace-grid">
          <section class="panel panel-surface chat-panel">
            <div class="section-header">
              <div>
                <div class="section-kicker">Chat</div>
                <div class="panel-title">聊天区</div>
              </div>
              <div class="section-note">直接输入完整教学需求，GeoBot 会联动 QGIS 执行并返回结果。</div>
            </div>

            <section id="population-showcase-card" class="showcase-card" hidden>
              <div class="showcase-card-header">
                <div>
                  <div class="showcase-title">人口单元演示模式</div>
                  <div id="population-showcase-headline" class="showcase-meta"></div>
                </div>
                <button id="population-preset-button" class="secondary-button" type="button">载入演示需求</button>
              </div>
              <div id="presentation-style-control" class="style-control" hidden>
                <label id="presentation-style-label" class="style-control-label" for="presentation-style-select"></label>
                <select id="presentation-style-select" class="style-control-select"></select>
              </div>
              <div id="population-showcase-path" class="showcase-path"></div>
              <div id="population-theme-status" class="theme-chip-row"></div>
            </section>

            <div id="chat-log" class="chat-log"></div>

            <div class="composer">
              <textarea
                id="chat-input"
                placeholder="例如：设计一节中国人口分布课，并输出相关地图结果。"
              ></textarea>
              <button id="chat-send-button" class="primary-button" type="button">发送需求</button>
            </div>
          </section>

          <section class="panel panel-surface results-panel">
            <div class="section-header">
              <div>
                <div class="section-kicker">Outputs</div>
                <div class="panel-title">结果展示区</div>
              </div>
              <div id="result-summary" class="result-summary">系统在线，等待新任务</div>
            </div>

            <section class="result-block result-stages-block">
              <div class="subsection-title">工作流阶段</div>
              <div id="workflow-stages" class="workflow-stages"></div>
            </section>

            <section id="showcase-highlights-section" class="result-block result-highlights-block" hidden>
              <div class="subsection-title">项目亮点</div>
              <div id="showcase-highlights" class="showcase-highlights"></div>
            </section>

            <section id="package-contract-section" class="result-block result-highlights-block" hidden>
              <div class="subsection-title">成果包合同摘要</div>
              <div id="package-contract-summary" class="contract-summary-list"></div>
            </section>

            <section class="result-block result-preview-block">
              <div class="subsection-title">结果预览</div>
              <div id="artifact-preview" class="artifact-preview empty">暂无导出结果</div>
            </section>

            <section class="result-block result-list-block">
              <div class="subsection-title">结果列表</div>
              <div id="artifact-list" class="artifact-list"></div>
            </section>
          </section>
        </section>
      </main>

      <div id="status-drawer-backdrop" class="status-drawer-backdrop" hidden></div>

      <aside id="status-drawer" class="status-drawer" aria-hidden="true" aria-labelledby="status-drawer-title">
        <div class="status-drawer-header">
          <div>
            <div class="section-kicker">System</div>
            <h2 id="status-drawer-title">状态中心</h2>
          </div>
          <button id="close-status-button" class="icon-button" type="button" aria-label="关闭状态中心">关闭</button>
        </div>

        <div id="drawer-job-summary" class="drawer-job-summary">系统在线，暂无执行中任务</div>

        <section class="drawer-section">
          <div class="drawer-section-title">系统状态</div>
          <div id="status-cards" class="status-cards"></div>
        </section>

        <section class="drawer-section drawer-section-grow">
          <div class="drawer-section-title">执行步骤</div>
          <div id="job-steps-meta" class="job-steps-meta">暂无执行中任务</div>
          <div id="job-steps" class="job-steps"></div>
        </section>
      </aside>
    </div>
    <script src="./app.js"></script>
  </body>
</html>
